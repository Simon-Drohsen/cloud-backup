security:
  hide_user_not_found: false
  enable_authenticator_manager: true

  providers:
    pimcore_admin:
      id: Pimcore\Security\User\UserProvider

    members:
      id: MembersBundle\Security\UserProvider

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    # Pimcore WebDAV HTTP basic // DO NOT CHANGE!
    pimcore_admin_webdav:
      pattern: ^/asset/webdav
      provider: pimcore_admin
      http_basic: ~

    # Pimcore Admin Bundle // DO NOT CHANGE!
    pimcore_admin: "%pimcore_admin_bundle.firewall_settings%"

    members_fe:
      pattern: ^/(?!(admin)($|/)).*$
      provider: members
      entry_point: form_login
      form_login:
        login_path: members_user_security_login
        check_path: members_user_security_check
        enable_csrf: true
      logout:
        path: members_user_security_logout
        invalidate_session: false
        target: /
      user_checker: MembersBundle\Security\UserChecker

  access_control:
    # Pimcore admin ACl  // DO NOT CHANGE!
    - { path: ^/admin/settings/display-custom-image, roles: PUBLIC_ACCESS }
    - { path: ^/admin/settings/display-custom-logo, roles: PUBLIC_ACCESS }
    - {
        path: ^/admin/login/2fa-verify,
        roles: IS_AUTHENTICATED_2FA_IN_PROGRESS,
      }
    - { path: ^/admin/login/2fa-setup, roles: ROLE_PIMCORE_USER }
    - { path: ^/admin/login/2fa, roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
    - { path: ^/admin/login$, roles: PUBLIC_ACCESS }
    - {
        path: ^/admin/login/(login|lostpassword|deeplink|csrf-token)$,
        roles: PUBLIC_ACCESS,
      }
    - { path: ^/admin, roles: ROLE_PIMCORE_USER }
    - { path: ^/asset/webdav, roles: ROLE_PIMCORE_USER }

    - { path: '^/members/login$', roles: PUBLIC_ACCESS }
    - { path: '^/members/register$', roles: PUBLIC_ACCESS }
    - { path: '^/my-files', roles: IS_AUTHENTICATED_FULLY }
    - { path: '^/company-files', roles: IS_AUTHENTICATED_FULLY }
#    - { path: '^/[a-z]{2}(_[A-Z]{2})?/members/login$', roles: PUBLIC_ACCESS }
#    - { path: '^/[a-z]{2}(_[A-Z]{2})?/members/register', roles: PUBLIC_ACCESS }


  role_hierarchy:
    # Pimcore admin  // DO NOT CHANGE!
    ROLE_PIMCORE_ADMIN: [ROLE_PIMCORE_USER]
    ROLE_MEMBERS_ADMIN: [ ROLE_MEMBERS_ADMIN ]
    ROLE_COMPANY_ADMIN: [ ROLE_COMPANY_ADMIN ]
